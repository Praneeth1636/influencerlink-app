name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  HUSKY: 0
  NEXT_TELEMETRY_DISABLED: 1
  SKIP_ENV_VALIDATION: true

jobs:
  verify:
    name: Install, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E smoke tests
        run: pnpm test:e2e

  vercel-preview:
    name: Vercel Preview
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Vercel secrets
        id: vercel
        shell: bash
        run: |
          if [[ -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" && -n "$VERCEL_TOKEN" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Vercel preview deploy. Configure VERCEL_ORG_ID, VERCEL_PROJECT_ID, and VERCEL_TOKEN repository secrets to enable it."
          fi

      - name: Pull Vercel preview environment
        if: steps.vercel.outputs.ready == 'true'
        run: pnpm dlx vercel@latest pull --yes --environment=preview --token "$VERCEL_TOKEN"

      - name: Build Vercel preview
        if: steps.vercel.outputs.ready == 'true'
        run: pnpm dlx vercel@latest build --token "$VERCEL_TOKEN"

      - name: Deploy Vercel preview
        if: steps.vercel.outputs.ready == 'true'
        run: pnpm dlx vercel@latest deploy --prebuilt --token "$VERCEL_TOKEN"
